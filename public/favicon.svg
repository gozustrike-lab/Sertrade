<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g transform="translate(32, 32)">
    <!-- Outer Hexagon -->
    <polygon
      points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14"
      fill="none"
      stroke="#004691"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <!-- Inner interlocking lines -->
    <line x1="-12" y1="-21" x2="12" y2="0" stroke="#004691" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="-21" x2="-12" y2="0" stroke="#004691" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="21" x2="12" y2="0" stroke="#004691" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="21" x2="-12" y2="0" stroke="#004691" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-17" y1="0" x2="17" y2="0" stroke="#004691" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small inner hexagon -->
    <polygon
      points="0,-10 8.7,-5 8.7,5 0,10 -8.7,5 -8.7,-5"
      fill="none"
      stroke="#004691"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
